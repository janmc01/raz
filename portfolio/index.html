<script>
  fetch("/default.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("header").innerHTML = data;
    });
</script>


<script>
  async function getLastPush(owner, repo) {
    try {
      const response = await fetch(`https://api.github.com/repos/${owner}/${repo}`);
      
      if (!response.ok) {
        throw new Error("Repository nicht gefunden");
      }

      const data = await response.json();
      
      const date = new Date(data.pushed_at);
      document.getElementById("page_update").textContent = date.toLocaleDateString("de-DE");
      
      console.log(`Letzter Code-Push: ${data.pushed_at}`);
    } catch (error) {
      console.error("Fehler:", error);
      document.getElementById("page_update").textContent = "Fehler beim Laden";
    }
  }

  getLastPush('janmc01', 'raz'); 
</script>
